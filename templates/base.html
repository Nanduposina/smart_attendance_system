<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Smart Attendance Dashboard" }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f6f9;
        }
        header {
            background-color: #1f2937;
            color: #fff;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 20px;
        }
        nav a {
            color: #fff;
            margin-left: 15px;
            text-decoration: none;
            font-size: 14px;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f9fafb;
        }
        button {
            padding: 6px 12px;
            background-color: #2563eb;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        label {
            font-size: 14px;
        }
        input, select {
            padding: 5px;
            margin: 4px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Smart Attendance Dashboard</h1>
        <nav>
            <a href="{{ url_for('home') }}">Dashboard</a>
            <a href="{{ url_for('students_page') }}">Students</a>
            <a href="{{ url_for('attendance') }}">Mark Attendance</a>
            <a href="{{ url_for('report') }}">Attendance Report</a>
        </nav>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
