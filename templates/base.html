<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Smart Attendance Dashboard" }}</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a;
            --bg-light: #f3f4f6;
            --card-bg: #ffffff;
            --accent: #2563eb;
            --accent-soft: #dbeafe;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-soft: #e5e7eb;
            --radius: 8px;
        }

        body {
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    background-color: var(--bg-light);
    font-size: 15px;          /* was ~14px, now slightly larger */
        }

        h2 {
            margin-top: 0;
            font-size: 22px;          /* was 20px */
            font-weight: 600;
            color: var(--text-main);
        }

        th, td {
            border-bottom: 1px solid var(--border-soft);
            padding: 11px 14px;       /* a bit more padding */
            font-size: 15px;          /* bigger table text */
        }

        button {
            padding: 7px 16px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;          /* slightly larger button text */
        }

        label {
            font-size: 15px;
        }

        input, select {
            padding: 7px 9px;
            margin: 4px 0;
            font-size: 15px;
        }

        header {
            background: linear-gradient(to right, #0f172a, #1f2937);
            color: #fff;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        nav a {
            color: #e5e7eb;
            margin-left: 18px;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #ffffff;
        }

        .container {
            padding: 24px;
            max-width: 1100px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Shared table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
        }

        th, td {
            border-bottom: 1px solid var(--border-soft);
            padding: 10px 12px;
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f9fafb;
            font-weight: 500;
        }

        tr:nth-child(even) td {
            background-color: #f9fafb;
        }

        button {
            padding: 6px 14px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        label {
            font-size: 14px;
            color: var(--text-main);
        }

        input, select {
            padding: 6px 8px;
            margin: 4px 0;
            font-size: 14px;
        }

        .form-row {
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Smart Attendance Dashboard</h1>
        <nav>
            <a href="{{ url_for('home') }}">Dashboard</a>
            <a href="{{ url_for('students_page') }}">Students</a>
            <a href="{{ url_for('attendance') }}">Mark Attendance</a>
            <a href="{{ url_for('report') }}">Attendance Report</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </nav>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
