<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Attendance - Students</title>
</head>
<body>
    <h1>Students List</h1>
    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody>
            {% for s in students %}
            <tr>
                <td>{{ s.roll_no }}</td>
                <td>{{ s.full_name }}</td>
                <td>{{ s.email }}</td>
                <td>{{ s.department }}</td>
                <td>{{ s.year_of_study }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
